<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Brief &middot; Archive</title>
  <meta name="description" content="Daily Brief archive">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">

  <style>
    :root {
      --bg:            #FAFAF8;
      --text:          #1A1A1A;
      --text-secondary:#6B7280;
      --accent:        #B91C1C;
      --border:        #E5E5E5;
      --font-sans:     'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 16px;
    }

    .section-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0;
    }

    /* ── Header ── */
    .site-header {
      padding: 32px 0 24px;
    }

    .header-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .header-subtitle {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    .header-back a {
      font-size: 14px;
      color: var(--text-secondary);
      display: inline-flex;
      align-items: center;
      gap: 4px;
      min-height: 44px;
    }
    .header-back a:hover { color: var(--accent); }

    @media (min-width: 640px) {
      .header-subtitle { font-size: 24px; }
    }

    /* ── Archive List ── */
    .archive-section {
      padding: 24px 0 32px;
    }

    .archive-list {
      list-style: none;
    }

    .archive-item {
      border-bottom: 1px solid var(--border);
    }

    .archive-item a {
      display: block;
      padding: 14px 0;
      font-size: 16px;
      font-weight: 500;
      color: var(--text);
      min-height: 44px;
      display: flex;
      align-items: center;
    }
    .archive-item a:hover {
      color: var(--accent);
      text-decoration: none;
    }

    .archive-empty {
      font-size: 14px;
      color: var(--text-secondary);
      font-style: italic;
      padding: 24px 0;
    }

    /* ── Footer ── */
    .site-footer {
      padding: 32px 0 48px;
      text-align: center;
    }

    .footer-meta {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .footer-meta a { color: var(--text-secondary); }
    .footer-meta a:hover { color: var(--accent); }
  </style>
</head>
<body>

  <div class="container">

    <header class="site-header">
      <div class="header-title" style="display:flex;justify-content:space-between;align-items:center;">
        <span>Daily Brief</span>
        <a href="https://kipeum86.github.io/daily-brief/archive//" style="font-size:13px;font-weight:600;letter-spacing:0.05em;color:var(--text-secondary);text-decoration:none;border:1px solid var(--border);border-radius:4px;padding:2px 10px;">EN → 한국어</a>
      </div>
      <h1 class="header-subtitle">Archive</h1>
      <div class="header-back">
        <a href="https://kipeum86.github.io/daily-brief/en//">◀ Latest Brief</a>
      </div>
    </header>

    <hr class="section-divider">

    <section class="archive-section" aria-label="과거 브리핑 목록">
      
      <ul class="archive-list">
        
        <li class="archive-item">
          <a href="https://kipeum86.github.io/daily-brief/en/archive/2026-03-27.html">2026-03-27</a>
        </li>
        
        <li class="archive-item">
          <a href="https://kipeum86.github.io/daily-brief/en/archive/2026-03-26.html">2026-03-26</a>
        </li>
        
        <li class="archive-item">
          <a href="https://kipeum86.github.io/daily-brief/en/archive/2026-03-25.html">2026-03-25</a>
        </li>
        
        <li class="archive-item">
          <a href="https://kipeum86.github.io/daily-brief/en/archive/2026-03-24.html">2026-03-24</a>
        </li>
        
      </ul>
      
    </section>

    <hr class="section-divider">

    <footer class="site-footer">
      <div class="footer-meta">
        <p>Powered by AI &middot; Data: Yahoo Finance, FRED, RSS</p>
      </div>
    </footer>

  </div>

</body>
</html>
