<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekly Recap Archive</title>
  <meta name="description" content="Weekly recap archive">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <style>
    :root {
      --bg: #f7f4ee;
      --panel: rgba(255, 253, 249, 0.9);
      --panel-strong: #fffdf9;
      --text: #1c1b1a;
      --text-secondary: #6b6b6b;
      --accent: #9f1d22;
      --border: #e8e0d3;
      --font-serif: 'Noto Serif KR', Georgia, serif;
      --font-sans: 'Pretendard Variable', Pretendard, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --shadow: 0 18px 36px rgba(20, 18, 15, 0.05);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font-sans);
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(159, 29, 34, 0.08), transparent 30%),
        radial-gradient(circle at 82% 10%, rgba(209, 177, 129, 0.16), transparent 22%),
        linear-gradient(180deg, #faf7f2 0%, #f6f0e6 100%);
    }
    a { color: inherit; text-decoration: none; }
    a:hover { color: var(--accent); }
    .shell {
      max-width: 980px;
      margin: 0 auto;
      padding: 28px 16px 72px;
    }
    .hero {
      border: 1px solid var(--border);
      border-radius: 30px;
      background:
        linear-gradient(135deg, rgba(255, 253, 249, 0.98), rgba(244, 235, 223, 0.96)),
        var(--panel-strong);
      box-shadow: var(--shadow);
      padding: 22px 18px 18px;
      margin-bottom: 18px;
    }
    .hero-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .kicker {
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 700;
    }
    .lang-toggle {
      font-size: 13px;
      color: var(--text-secondary);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 12px;
      background: rgba(255, 255, 255, 0.7);
      min-height: 40px;
      display: inline-flex;
      align-items: center;
    }
    .title {
      font-family: var(--font-serif);
      font-size: 34px;
      line-height: 1.08;
      margin: 0 0 10px;
    }
    .deck {
      margin: 0;
      color: var(--text-secondary);
      font-size: 15px;
      max-width: 56ch;
    }
    .back {
      display: inline-flex;
      align-items: center;
      min-height: 44px;
      margin-top: 16px;
      color: var(--text-secondary);
      font-size: 14px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 18px;
      box-shadow: var(--shadow);
    }
    .list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 12px;
    }
    .item a {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.82);
      transition: transform 120ms ease, border-color 120ms ease;
    }
    .item a:hover {
      transform: translateY(-1px);
      border-color: #d6c8b5;
    }
    .week-id {
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
    }
    .week-label {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.35;
    }
    .empty {
      color: var(--text-secondary);
      font-style: italic;
      margin: 0;
    }
    @media (min-width: 720px) {
      .shell { padding: 32px 24px 84px; }
      .hero { padding: 26px 24px 22px; }
      .title { font-size: 42px; }
      .item a {
        grid-template-columns: 180px 1fr;
        align-items: center;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div class="hero-top">
        <div class="kicker">Weekly Recap</div>
        <a class="lang-toggle" href="https://kipeum86.github.io/daily-brief/weekly/archive//">EN → 한국어</a>
      </div>
      <h1 class="title">Archive</h1>
      <p class="deck">Every weekly recap in one place, ordered like a running shelf of market letters.</p>
      <a class="back" href="https://kipeum86.github.io/daily-brief/en/weekly//">◀ Latest Weekly Recap</a>
    </section>

    <section class="panel">
      
      <ul class="list">
        
        <li class="item">
          <a href="https://kipeum86.github.io/daily-brief/en/weekly/archive/2026-W16.html">
            <span class="week-id">2026-W16</span>
            <span class="week-label">April 13-19, 2026</span>
          </a>
        </li>
        
        <li class="item">
          <a href="https://kipeum86.github.io/daily-brief/en/weekly/archive/2026-W15.html">
            <span class="week-id">2026-W15</span>
            <span class="week-label">April 6-10, 2026</span>
          </a>
        </li>
        
        <li class="item">
          <a href="https://kipeum86.github.io/daily-brief/en/weekly/archive/2026-W14.html">
            <span class="week-id">2026-W14</span>
            <span class="week-label">March 30 - April 3, 2026</span>
          </a>
        </li>
        
        <li class="item">
          <a href="https://kipeum86.github.io/daily-brief/en/weekly/archive/2026-W13.html">
            <span class="week-id">2026-W13</span>
            <span class="week-label">March 23-27, 2026</span>
          </a>
        </li>
        
      </ul>
      
    </section>
  </div>
</body>
</html>
