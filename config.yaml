# Daily Brief Configuration
briefing:
  name: "Daily Brief"
  language: "ko"
  timezone: "Asia/Seoul"

# LLM Provider
llm:
  provider: "gemini"          # gemini, claude, openai
  model: "gemini-2.5-flash"  # 무료 tier, 250회/일, 브리핑에 충분
  max_input_chars: 8000

# 시장 데이터
markets:
  kr:
    indices: ["^KS11", "^KQ11"]          # KOSPI, KOSDAQ
    names: ["KOSPI", "KOSDAQ"]
  us:
    indices: ["^GSPC", "^IXIC", "^DJI"]  # S&P 500, Nasdaq, Dow
    names: ["S&P 500", "Nasdaq", "Dow"]
  fx:
    pairs: ["USDKRW=X", "JPYKRW=X"]
    names: ["USD/KRW", "JPY/KRW"]
  commodities:
    tickers: ["GC=F", "CL=F"]
    names: ["Gold", "WTI Oil"]
  crypto:
    tickers: ["BTC-USD", "ETH-USD"]
    names: ["Bitcoin", "Ethereum"]
  risk:
    tickers: ["^VIX", "^TNX", "DX-Y.NYB"]
    names: ["VIX", "US 10Y", "Dollar Index"]
    fred_series: ["DGS10", "DTWEXBGS"]    # FRED fallback
  # S&P 500 섹터 ETF — 미니 히트맵으로 어느 섹터가 올랐는지 한눈에
  sectors:
    tickers: ["XLK", "XLF", "XLV", "XLE", "XLI", "XLP", "XLU", "XLRE", "XLB", "XLC", "XLY"]
    names: ["Tech", "Finance", "Health", "Energy", "Industrial", "Staples", "Utilities", "Real Estate", "Materials", "Comms", "Discretionary"]

# 뉴스 RSS
news:
  world:
    # 권위 있는 무료 매체, 다양한 관점
    - name: "Reuters"
      url: "https://news.google.com/rss/search?q=site:reuters.com+when:1d&hl=en"
    - name: "AP News"
      url: "https://news.google.com/rss/search?q=site:apnews.com+when:1d&hl=en"
    - name: "BBC World"
      url: "https://feeds.bbci.co.uk/news/world/rss.xml"
    - name: "The Guardian"
      url: "https://www.theguardian.com/world/rss"
    - name: "Al Jazeera"
      url: "https://www.aljazeera.com/xml/rss/all.xml"
    - name: "NPR"
      url: "https://feeds.npr.org/1001/rss.xml"
    - name: "DW"
      url: "https://rss.dw.com/rdf/rss-en-all"
    - name: "France 24"
      url: "https://www.france24.com/en/rss"
    - name: "SCMP"
      url: "https://www.scmp.com/rss/91/feed"
    - name: "ABC Australia"
      url: "https://www.abc.net.au/news/feed/2942460/rss.xml"
  korea_major:
    # 메이저 매체 RSS — 편집국이 선별한 1면급 기사
    - name: "연합뉴스"
      url: "https://www.yna.co.kr/rss/news.xml"
    - name: "조선일보"
      url: "https://www.chosun.com/arc/outboundfeeds/rss/?outputType=xml"
    - name: "중앙일보"
      url: "https://rss.joins.com/joins_news_list.xml"
    - name: "동아일보"
      url: "https://rss.donga.com/total.xml"
    - name: "한겨레"
      url: "https://www.hani.co.kr/rss/"
    - name: "한국경제"
      url: "https://www.hankyung.com/feed/all-news"
    - name: "매일경제"
      url: "https://www.mk.co.kr/rss/30000001/"
  korea:
    source: "naver"  # 보조: 키워드 기반 심층 검색
    queries:
      - "반도체 수출"
      - "금리 한국은행"
      - "부동산 정책"
    display: 3       # 보조 역할이므로 축소
    sort: "sim"      # 관련도순으로 변경 (잡뉴스 유입 방지)
  finance:
    # 금융 전문 매체 (무료 RSS)
    - name: "CNBC"             # 미국 금융 뉴스
      url: "https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=100003114"
    - name: "MarketWatch"      # 시장 분석
      url: "https://feeds.content.dowjones.io/public/rss/mw_topstories"
  top_n: 5                    # 카테고리당 최대 뉴스 수
  top_n_weekend: 8            # 월요일(주말 커버) 뉴스 수
  days_back: 2

# 뉴스 필터링
keywords:
  include: []                 # 빈 배열 = 전체 포함
  exclude:
    - "광고"
    - "sponsored"
    - "운세"
    - "별자리"
    - "인사발령"
    - "인사 발령"
    - "부고"
    - "로또"
    - "당첨번호"

# 중복 제거
dedup:
  source_similarity_threshold: 0.75
  cross_similarity_threshold: 0.60
  min_overlap_tokens: 3
  event_key_enabled: true

# 이메일
email:
  enabled: true
  sender_name: "Daily Brief"
  sender_email: "kipeum86@gmail.com"
  subject_prefix: "Daily Brief"
  subscribers_file: "subscribers.txt"  # 한 줄에 이메일 하나. .gitignore에 포함.

# Google Sheets 아카이브
sheets:
  enabled: true
  spreadsheet_id: "1zh4uRh9Amb_LQytinKtni8tw11koz73FJT_wgCf4k7k"

# 웹사이트
site_url: "https://kipeum86.github.io/daily-brief"

# 출력
output:
  dir: "output"
  archive_dir: "output/archive"

# 스케줄 (참고용 — 실제 스케줄은 GitHub Actions에서 관리)
schedule:
  morning_cron: "30 21 * * 0-4"  # UTC = KST 06:30 월-금
  weekly_cron: "0 0 * * 5"       # UTC = KST 토 09:00
  monthly_cron: "30 22 1 * *"    # UTC = KST 매월 2일 07:30
