# Daily Brief Configuration
briefing:
  name: "Daily Brief"
  language: "ko"
  timezone: "Asia/Seoul"

# LLM Provider
llm:
  provider: "gemini"          # gemini, claude, openai
  model: "gemini-2.5-flash"  # 무료 tier, 250회/일, 브리핑에 충분
  max_input_chars: 8000

# 시장 데이터
markets:
  kr:
    indices: ["^KS11", "^KQ11"]          # KOSPI, KOSDAQ
    names: ["KOSPI", "KOSDAQ"]
  us:
    indices: ["^GSPC", "^IXIC", "^DJI"]  # S&P 500, Nasdaq, Dow
    names: ["S&P 500", "Nasdaq", "Dow"]
  fx:
    pairs: ["USDKRW=X", "JPYKRW=X"]
    names: ["USD/KRW", "JPY/KRW"]
  commodities:
    tickers: ["GC=F", "CL=F"]
    names: ["Gold", "WTI Oil"]
  crypto:
    tickers: ["BTC-USD", "ETH-USD"]
    names: ["Bitcoin", "Ethereum"]
  risk:
    tickers: ["^VIX", "^TNX", "DX-Y.NYB"]
    names: ["VIX", "US 10Y", "Dollar Index"]
    fred_series: ["DGS10", "DTWEXBGS"]    # FRED fallback
  # S&P 500 섹터 ETF — 미니 히트맵으로 어느 섹터가 올랐는지 한눈에
  sectors:
    tickers: ["XLK", "XLF", "XLV", "XLE", "XLI", "XLP", "XLU", "XLRE", "XLB", "XLC", "XLY"]
    names: ["Tech", "Finance", "Health", "Energy", "Industrial", "Staples", "Utilities", "Real Estate", "Materials", "Comms", "Discretionary"]

# 뉴스 RSS
news:
  world:
    # 권위 있는 무료 매체, 다양한 관점 (paywall 없음)
    - name: "Reuters"          # 통신사 — 팩트 중심, 가장 안정적
      url: "https://feeds.reuters.com/reuters/topNews"
    - name: "BBC World"        # 영국 — 유럽/글로벌 관점
      url: "https://feeds.bbci.co.uk/news/world/rss.xml"
    - name: "The Guardian"     # 영국 — 진보적 분석, 무료 전문
      url: "https://www.theguardian.com/world/rss"
    - name: "Al Jazeera"       # 중동 — 글로벌 사우스 관점
      url: "https://www.aljazeera.com/xml/rss/all.xml"
    - name: "AP News"          # 미국 통신사 — 팩트 중심
      url: "https://rsshub.app/apnews/topics/apf-topnews"
    - name: "NPR"              # 미국 공영 — 분석적, 균형잡힌 관점
      url: "https://feeds.npr.org/1001/rss.xml"
  korea:
    source: "naver"  # naver API (추천) 또는 rss
    queries:         # 네이버 뉴스 검색 키워드 (한국 국내 이슈 중심)
      - "경제 정책"
      - "부동산"
      - "반도체 수출"
      - "금리"
      - "국내 증시"
    display: 5       # 키워드당 가져올 기사 수
    sort: "date"     # date(최신순) 또는 sim(관련도순)
  finance:
    # 금융 전문 매체 (무료 RSS)
    - name: "CNBC"             # 미국 금융 뉴스
      url: "https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=100003114"
    - name: "MarketWatch"      # 시장 분석
      url: "https://feeds.content.dowjones.io/public/rss/mw_topstories"
  top_n: 5                    # 카테고리당 최대 뉴스 수
  top_n_weekend: 8            # 월요일(주말 커버) 뉴스 수
  days_back: 2

# 뉴스 필터링
keywords:
  include: []                 # 빈 배열 = 전체 포함
  exclude: ["광고", "sponsored"]

# 중복 제거
dedup:
  source_similarity_threshold: 0.75
  cross_similarity_threshold: 0.60
  min_overlap_tokens: 3
  event_key_enabled: true

# 이메일
email:
  enabled: true
  sender_name: "Daily Brief"
  sender_email: "brief@yourdomain.com"
  subject_prefix: "Daily Brief"
  subscribers:
    - "your@email.com"

# Google Sheets 아카이브
sheets:
  enabled: true
  spreadsheet_id: "1zh4uRh9Amb_LQytinKtni8tw11koz73FJT_wgCf4k7k"

# 출력
output:
  dir: "output"
  archive_dir: "output/archive"

# 스케줄 (참고용 — 실제 스케줄은 GitHub Actions에서 관리)
schedule:
  morning_cron: "0 20 * * 0-4"   # UTC = KST 05:00 월-금
  weekly_cron: "0 0 * * 5"       # UTC = KST 토 09:00
  monthly_cron: "30 22 1 * *"    # UTC = KST 매월 2일 07:30
