<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekly Recap Archive</title>
  <meta name="description" content="Weekly recap archive">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <style>
    :root {
      --bg: #f7f4ee;
      --panel: #fffdf9;
      --text: #1c1b1a;
      --text-secondary: #6b6b6b;
      --accent: #9f1d22;
      --border: #e8e0d3;
      --font-sans: 'Pretendard Variable', Pretendard, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    body {
      margin: 0;
      font-family: var(--font-sans);
      color: var(--text);
      background: linear-gradient(180deg, #faf7f2 0%, #f6f0e6 100%);
    }
    a { color: inherit; text-decoration: none; }
    a:hover { color: var(--accent); }
    .shell {
      max-width: 720px;
      margin: 0 auto;
      padding: 28px 16px 56px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }
    .kicker {
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 700;
    }
    .lang-toggle {
      font-size: 13px;
      color: var(--text-secondary);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px 12px;
      background: rgba(255,255,255,0.72);
    }
    .title {
      font-size: 32px;
      margin: 0 0 8px;
    }
    .back {
      display: inline-flex;
      margin-bottom: 18px;
      color: var(--text-secondary);
      min-height: 44px;
      align-items: center;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 16px 18px;
      box-shadow: 0 18px 36px rgba(20,18,15,0.04);
    }
    .list {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .item + .item {
      border-top: 1px solid var(--border);
    }
    .item a {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 0;
    }
    .week-id {
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 600;
    }
    .week-label {
      color: var(--text-secondary);
      font-size: 13px;
    }
    .empty {
      color: var(--text-secondary);
      font-style: italic;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="header">
      <div class="kicker">Weekly Recap</div>
      <a class="lang-toggle" href="https://kipeum86.github.io/daily-brief/en/weekly/archive//">KR → English</a>
    </div>
    <h1 class="title">아카이브</h1>
    <a class="back" href="https://kipeum86.github.io/daily-brief/weekly//">◀ 최신 주간 리캡</a>
    <div class="panel">
      
      <ul class="list">
        
        <li class="item">
          <a href="https://kipeum86.github.io/daily-brief/weekly/archive/2026-W13.html">
            <span class="week-id">2026-W13</span>
            <span class="week-label">2026년 3월 23일 월요일 - 3월 26일 목요일</span>
          </a>
        </li>
        
      </ul>
      
    </div>
  </div>
</body>
</html>
