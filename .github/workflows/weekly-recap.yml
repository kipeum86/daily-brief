# ============================================================
# Weekly Recap — 주간 요약 브리핑 자동 생성 & 배포
# 스케줄: UTC 00:00 (토) = KST 09:00 (토)
# daily snapshot 기반 주간 리캡 생성
# ============================================================

name: Weekly Recap

on:
  schedule:
    # UTC 00:00 토 = KST 09:00 토
    - cron: "0 0 * * 6"
  workflow_dispatch: # 수동 테스트용

# gh-pages 브랜치에 push하기 위한 권한
permissions:
  contents: write

# 동시 실행 방지 — 진행 중인 실행은 취소
concurrency:
  group: weekly-recap
  cancel-in-progress: true

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest

    env:
      # API 키 (GitHub Secrets에서 주입)
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}             # Gemini LLM
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}                 # 경제 지표
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}           # 네이버 뉴스
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}   # 네이버 뉴스
      GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}               # 이메일 발송
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}     # 이메일 발송
      SUBSCRIBERS: ${{ secrets.SUBSCRIBERS }}                   # 수신자 (쉼표 구분)
      GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}  # 시트 아카이브

    steps:
      # 1. 소스 코드 체크아웃
      - name: 📥 저장소 체크아웃
        uses: actions/checkout@v4

      # 2. Python 3.12 설정
      - name: 🐍 Python 3.12 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. pip 의존성 캐시 (빌드 시간 단축)
      - name: 💾 pip 캐시
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 4. 의존성 설치
      - name: 📦 의존성 설치
        run: pip install -r requirements.txt

      # 5. 기존 아카이브 복원 (archive index에 과거 브리핑 포함)
      - name: 📂 기존 아카이브 복원
        run: |
          git fetch origin gh-pages --depth=1 || true
          mkdir -p output/archive output/en/archive output/data/daily output/weekly/archive output/en/weekly/archive
          git checkout origin/gh-pages -- archive/ 2>/dev/null && mv archive/*.html output/archive/ 2>/dev/null || true
          git checkout origin/gh-pages -- en/archive/ 2>/dev/null && mv en/archive/*.html output/en/archive/ 2>/dev/null || true
          git checkout origin/gh-pages -- data/daily/ 2>/dev/null && cp -R data/daily/. output/data/daily/ 2>/dev/null || true
          git checkout origin/gh-pages -- weekly/archive/ 2>/dev/null && mv weekly/archive/*.html output/weekly/archive/ 2>/dev/null || true
          git checkout origin/gh-pages -- en/weekly/archive/ 2>/dev/null && mv en/weekly/archive/*.html output/en/weekly/archive/ 2>/dev/null || true
          echo "Restored $(ls output/archive/*.html 2>/dev/null | wc -l) archive files"

      # 6. 스냅샷 기반 주간 리캡 생성
      - name: 📊 주간 요약 생성
        run: python main.py --brief-type weekly

      # 7. GitHub Pages 배포 (기존 아카이브 유지)
      - name: 🚀 GitHub Pages 배포
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          keep_files: true  # 기존 아카이브 파일 보존
